# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → connect RifqiMT/gdpr-qa-platform → Apply.
# Then Environment: add GROQ_API_KEY (and optional TAVILY_API_KEY, OPENROUTER_REFERRER = your https URL).

services:
  - type: web
    name: gdpr-qa-platform
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
